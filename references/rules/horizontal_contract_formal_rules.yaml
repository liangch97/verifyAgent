version: "2026-04-24"
source_document: "横向合同基本审核要点_科研秘书版20240111.docx + word/comments.xml"
rules:
  - {id: A1, section: 主体资格, title: 项目名称与甲乙方基础信息, scope: enforce, severity: block, source_text: "高亮处要求核对项目名称、委托方（甲方）、受托方（乙方）；我校名称应为“中山大学”，不得以二级单位（法人单位除外）为名签订合同", comment_guidance: "可用企查查截图或人工核验记录核验主体信息", check_type: basic_parties, patterns: ["项目名称", "委托方", "受托方", "中山大学"], message: "项目名称、甲乙方或乙方主体信息不完整/不规范", suggestion: "补全项目名称，乙方统一改为中山大学，非法人二级单位不得独立签约"}
  - {id: A1_REVIEW, section: 主体资格, title: 甲方工商信息外部核验, scope: review, severity: warn, source_text: "甲方信息需通过工商系统核对", comment_guidance: "查询法人、统一社会信用代码、住所地址是否一致", reviewer_comments: [{id: 0, anchor: '合同签约方必须是合法机构且具有法人资格', text: '用豆包查询“查一下XXX这个公司的信息包括法人、统一信用代码”；或者通过企查查查询法人、信用代码、法人、住所地址与合同内的法人、信用代码、法人、住所地址是否一致。'}, {id: 1, anchor: '合同签约方必须是合法机构且具有法人资格', text: '豆包查询实例：https://www.doubao.com/thread/waf3848f104a2f067'}], check_type: review_only, always_review: true, patterns: ["甲方", "法定代表人", "统一社会信用代码"], message: "需外部平台核验甲方工商登记信息", suggestion: "补充企查查截图或人工核验记录"}
  - {id: A2, section: 主体资格, title: 关联关系声明, scope: review, severity: warn, source_text: "如甲方与课题组存在关联关系需声明", comment_guidance: "需结合工商信息与课题组名单判断", check_type: review_only, always_review: true, patterns: ["股东", "课题组", "关联关系声明"], message: "需人工核验是否存在关联关系", suggestion: "若有关联关系请提供声明材料"}
  - {id: A3, section: 主体资格, title: 民用非涉密非军工复核, scope: review, severity: warn, source_text: "合作内容应民用且不涉军事国防国家机密", comment_guidance: "老师确认+封面是否出现密级+年份", reviewer_comments: [{id: 2, anchor: '合作内容应为民用，内容不涉及军事/国防/国家机密等，且甲方为非军事国防单位。', text: '需要通过两种方式同步确认：1.和项目负责老师直接确认2.看合同封面右上角有无标注“密级⭐年份”'}], check_type: review_only, always_review: true, patterns: ["军事", "军方", "国防", "军工", "涉密", "国家秘密", "密级", "机密", "绝密"], message: "民用、非涉密、非军工属性需按批注口径复核", suggestion: "联系项目负责人确认并检查封面密级标注"}
  - {id: A4, section: 主体资格, title: 甲方境内注册, scope: not_checked, severity: not_checked, source_text: "甲方应为境内注册公司", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 3, anchor: '4）甲方应为境内注册公司。（境外资助项目请按照境外资助项目审批指南办理：https://eao.sysu.edu.cn/jlxm/jlxm04/index.htm）', text: '不审核'}], check_type: not_checked, patterns: ["境内注册"], message: "该项按口径不自动审核，仅留档", suggestion: "如需审查请走境外资助项目审批流程"}
  - {id: A5, section: 主体资格, title: 联系人完整性与一致性, scope: enforce, severity: warn, source_text: "双方应指定联系人并保持一致", comment_guidance: "检查联系人、通讯地址、电话、邮编、邮箱", reviewer_comments: [{id: 4, anchor: '双方必须明确指定联系人，且联系人应前后保持一致，联系人应为校内人员。', text: '看合同内“项目联系人”、“通讯地址”、“电话”、“邮编”、“邮箱”是否有填写'}], check_type: contacts_required, patterns: ["联系人", "通讯地址", "电话", "邮编", "邮箱", "电邮"], message: "联系人字段不完整或可能不一致", suggestion: "补全联系人信息并核对前后条款一致性"}
  - {id: A5_EMAIL, section: 主体资格, title: 乙方邮箱域名提醒, scope: enforce, severity: warn, source_text: "联系人应为校内人员", comment_guidance: "乙方邮箱建议为sysu.edu.cn", check_type: contact_email_domain, patterns: ["@sysu.edu.cn", "@mail.sysu.edu.cn"], message: "未识别到校内邮箱域名", suggestion: "建议补充校内邮箱或说明原因"}
  - {id: B1, section: 项目合作内容, title: 合同类型与委托内容相符, scope: not_checked, severity: not_checked, source_text: "合同类型与委托内容应匹配", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 5, anchor: '1）确定合同类型，委托内容是否与合同类型相符。', text: '不审核'}], check_type: not_checked, patterns: ["技术开发", "技术合作"], message: "该项不自动审核，仅留档", suggestion: "必要时由科研秘书人工判断"}
  - {id: B2, section: 项目合作内容, title: 动物伦理人遗材料, scope: not_checked, severity: not_checked, source_text: "涉及动物伦理人遗需审批材料", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 6, anchor: '2）是否涉及动物实验or伦理or人遗，涉及动物实验要提供动物伦理审查意见；涉及伦理要提供伦理审查委员会批件；涉及人遗要依据人遗条例、细则，提供科技部人遗系统上完成的审批/许可证明。', text: '不审核'}], check_type: not_checked, patterns: ["伦理", "人遗"], message: "该项不自动审核，仅留档", suggestion: "如涉及请补交对应批件"}
  - {id: B3, section: 项目合作内容, title: 不得涉及机构设立, scope: enforce, severity: warn, source_text: "合同不能涉及机构设立", comment_guidance: "关注联合成立/共建平台实验室中心研究院基地", reviewer_comments: [{id: 7, anchor: '3）不能涉及机构设立。', text: '看合同内容是否有“联合成立XXX平台、实验室”的相关文本'}], check_type: forbidden_phrase_any, patterns: ["联合成立", "共同成立", "设立", "共建", "联合建设", "平台", "实验室", "中心", "研究院", "基地"], message: "疑似涉及机构设立条款", suggestion: "删除或改写机构设立相关条款"}
  - {id: B4, section: 项目合作内容, title: 科研伦理意识形态问卷, scope: not_checked, severity: not_checked, source_text: "涉及伦理道德和意识形态需审查", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 8, anchor: '4）涉及科研伦理道德，需事先经过相关伦理委员会审查，提供相应批件；涉及社会敏感话题或意识形态，需事先经过宣传部审查通过；涉及问卷作为合同附件，需二级单位党委对意识形态进行把关，并提供意识形态审核意见作为附件上传，合同通过合同管理系统提交审核', text: '不审核'}], check_type: not_checked, patterns: ["问卷", "意识形态"], message: "该项不自动审核，仅留档", suggestion: "必要时提交宣传部/党委审查意见"}
  - {id: C1, section: 合同金额及付款, title: 对公账户一致性, scope: enforce, severity: block, source_text: "应使用中山大学对公账户信息", comment_guidance: "核对户名账号开户行", reviewer_comments: [{id: 9, anchor: '（户名：中山大学；账号：44050143004609000001；开户行：中国建设银行广州中山大学支行）', text: '对比合同内的中山大学账户信息“开户行”“户名”“账号”是否与我校对公账户信息一致'}], check_type: bank_account, patterns: ["中山大学", "44050143004609000001", "中国建设银行广州中山大学支行"], message: "对公账户信息缺失或不一致", suggestion: "按学校标准账户更正户名账号开户行"}
  - {id: C2, section: 合同金额及付款, title: 来款单位及第三方, scope: not_checked, severity: not_checked, source_text: "若有第三方需列丙方并签章", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 10, anchor: '2）注明来款单位名称，若有不同法人的第三方，要加上丙方信息并签字盖章。', text: '不审核'}], check_type: not_checked, patterns: ["丙方", "第三方"], message: "该项不自动审核，仅留档", suggestion: "如涉第三方请在合同中补齐信息"}
  - {id: C3, section: 合同金额及付款, title: 首付款设置与付款节点, scope: enforce, severity: block, source_text: "必须设置首付款，不可全部成果后才付款", comment_guidance: "关注首笔付款是否在合同生效后", reviewer_comments: [{id: 11, anchor: '3）必须设置首付款，原则上不允许提交所有项目成果后再付款。合同签订后的第一笔至少要足够老师开展研究工作。', text: '审核合同内的付款计划，第一笔付款在合同生效后拨付。如果出现“提交所有项目成果后付合同全款”相关条款需要重点提醒'}], check_type: payment_first_installment, patterns: ["首付款", "签订后", "合同生效后", "提交所有项目成果后支付全款", "验收合格后支付全部"], message: "首付款安排不合规或付款计划缺失", suggestion: "设置合同生效后可执行的首付款节点"}
  - {id: C4, section: 合同金额及付款, title: 绩效预算说明, scope: enforce, severity: warn, source_text: "绩效占比超过50%需说明，关注70%上限表述", comment_guidance: "搜索绩效并核对是否说明最多70%", reviewer_comments: [{id: 12, anchor: '预算需符合中山大学横向项目经费管理办法相关规定，管理费、水电费及税费预算必须充足，绩效占比超过50%的需要提供说明。', text: '搜索合同文本内和”绩效“相关的表述，搜索不到就要提醒老师补充上，搜索到了就看是否有说明”合同命额的最多70%用于项目的人员绩效费。“'}], check_type: performance_budget, patterns: ["绩效", "70%", "不超过70%", "最多70%"], message: "绩效条款缺失或上限说明不足", suggestion: "补充绩效比例说明，建议明确不超过70%"}
  - {id: C5, section: 合同金额及付款, title: 商业保险支出, scope: not_checked, severity: not_checked, source_text: "原则上科研经费不得购买商业保险", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 13, anchor: '5）原则上，科研经费不得用于购买商业保险。', text: '不审核'}], check_type: not_checked, patterns: ["商业保险"], message: "该项不自动审核，仅留档", suggestion: "如涉商业保险需另行说明"}
  - {id: C6, section: 合同金额及付款, title: 结余经费不得退回, scope: enforce, severity: warn, source_text: "项目结余经费留归学校统筹使用", comment_guidance: "出现结余退回需提醒", reviewer_comments: [{id: 14, anchor: '6）项目结余经费须留归我校统筹安排使用，不予退还。', text: '搜索合同文本内是否有”项目结余经费退回“的内容，如有需要重点提醒'}], check_type: forbidden_phrase_any, patterns: ["结余经费退回", "结余退还", "剩余经费返还", "退回甲方"], message: "检测到结余经费退回甲方相关表述", suggestion: "删除退回条款，改为留归学校统筹"}
  - {id: D1, section: 成果及知识产权, title: 知识产权归属风险, scope: enforce, severity: warn, source_text: "技术开发合同原则上知识产权双方共有", comment_guidance: "关注归甲方所有或共有但未写比例", reviewer_comments: [{id: 15, anchor: '技术开发合同原则上要求知识产权归双方共有。', text: '搜索合同文本内”知识产权“相关的内容，找到约定知识产权归属的内容，查看具体是归甲方所有还是归双方共有，如果归双方共有，是否有说明知识产权的权利、收益分配比例'}], check_type: ip_ownership, patterns: ["知识产权", "归甲方所有", "甲方单方所有", "双方共有", "收益分配比例"], message: "知识产权归属条款存在风险或信息不足", suggestion: "优先约定双方共有并明确权利收益比例"}
  - {id: D2, section: 成果及知识产权, title: 甲方单方所有时承诺书, scope: review, severity: warn, source_text: "若甲方单方所有需项目承诺书1", comment_guidance: "检查是否有项目承诺书1或一般知识产权条款承诺书", check_type: attachment_presence, patterns: ["项目承诺书1", "一般知识产权相关条款", "项目承诺书"], message: "若知识产权归甲方单方所有，需补充承诺书材料", suggestion: "补交《项目承诺书1（一般知识产权相关条款）》"}
  - {id: D3, section: 成果及知识产权, title: 双方共有时收益分配, scope: enforce, severity: warn, source_text: "双方共有需约定利益分配比例", comment_guidance: "检查比例、份额、收益分配", check_type: shared_ip_distribution, patterns: ["比例", "收益分配", "权利比例", "份额"], message: "未明确双方共有下的收益/权利分配比例", suggestion: "补充各方比例与收益分配机制"}
  - {id: D4, section: 成果及知识产权, title: 限制二次开发承诺, scope: not_checked, severity: not_checked, source_text: "限制二次开发需书面承诺", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 16, anchor: '3）含有限制二次开发相关条款，项目负责人须书面承诺在项目执行过程中及项目完成后遵循相关要求及承担责任。4）技术开发合同如涉及软件著作权，须注明权益归属（涉及软件开发合同，软件著作权需归属甲方或各方共有，方可办理认定登记）。', text: '不审核'}], check_type: not_checked, patterns: ["二次开发"], message: "该项不自动审核，仅留档", suggestion: "如有条款请补项目负责人书面承诺"}
  - {id: D5, section: 成果及知识产权, title: 软件著作权归属, scope: not_checked, severity: not_checked, source_text: "涉及软著须注明权益归属", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 16, anchor: '3）含有限制二次开发相关条款，项目负责人须书面承诺在项目执行过程中及项目完成后遵循相关要求及承担责任。4）技术开发合同如涉及软件著作权，须注明权益归属（涉及软件开发合同，软件著作权需归属甲方或各方共有，方可办理认定登记）。', text: '不审核'}], check_type: not_checked, patterns: ["软件著作权"], message: "该项不自动审核，仅留档", suggestion: "涉及软著时补充归属条款"}
  - {id: E1, section: 风险控制, title: 有效期限与倒签提示, scope: enforce, severity: warn, source_text: "不允许倒签，原则上有效期不超过5年", comment_guidance: "搜索有效期限/合同期限/工作计划起始", reviewer_comments: [{id: 17, anchor: '1）签订时间：需和实际盖章时间相符，不允许倒签，可留空；有效期限：留空或写“自合同签订之日起-截止日期”（关注截止日期的合理性），原则上有效期不超过5年。', text: '搜索合同文本内”有效期限“、”合同期限“文本，如果期限起始日期在当天之前，需要重点提醒。如果没有相关的信息，需要查看合同内的工作计划的起始时间，是否有明确的起始日期，如果没有明确写明可以不管。'}], check_type: date_term, patterns: ["有效期限", "合同期限", "起止日期", "工作计划"], message: "期限条款可能存在倒签或超期风险", suggestion: "补充明确起止日期并控制在5年内"}
  - {id: E2, section: 风险控制, title: 保密与违约责任对等, scope: review, severity: warn, source_text: "双方保密责任及违约责任应对等", comment_guidance: "需语义复核", check_type: review_only, patterns: ["保密责任", "违约责任"], message: "责任对等性需人工语义判断", suggestion: "请项目负责人和合作方协商对等责任"}
  - {id: E3, section: 风险控制, title: 保密期限限制, scope: enforce, severity: block, source_text: "保密期限一般在合同有效期内且最多5年，不接受无期限", comment_guidance: "搜索保密期限，不能无限期/长期", reviewer_comments: [{id: 18, anchor: '3）保密期限一般在合同有效期内，不接受无期限、最多5年，不可无注明或默认长期。', text: '搜索合同文本内的”保密期限“，不能是”无限期“”长期“，具体期限不能超过5年'}], check_type: confidentiality_term, patterns: ["保密期限", "无期限", "无限期", "长期", "永久"], message: "保密期限不合规（无期限/长期/超过5年）或未明确", suggestion: "将保密期限改为明确且不超过5年的具体期限"}
  - {id: E4, section: 风险控制, title: 国家秘密, scope: not_checked, severity: not_checked, source_text: "合同不得涉及国家秘密", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 19, anchor: '4）合同工作内容不得涉及国家秘密。', text: '不审核'}], check_type: not_checked, patterns: ["国家秘密"], message: "该项不自动审核，仅留档", suggestion: "如涉密项目请走涉密流程"}
  - {id: E5, section: 风险控制, title: 赔偿上限与无限责任, scope: enforce, severity: block, source_text: "不得承担无限责任，赔偿原则上不超过甲方已付或合同总金额", comment_guidance: "违约金超过合同总金额需重点提醒", reviewer_comments: [{id: 20, anchor: '5）泄密责任不能超出责任范围，不得要求学校承担无限责任；且赔偿金额不超过甲方已付金额（凡涉及赔偿，原则上均不超过甲方已付金额或不超过合同总金额），如违约责任较大、赔偿金额较大、泄密责任较大等，则需课题组签署《项目承诺书模板（用于保密、保险等条款）》。', text: '搜索合同文本内的”违约责任“”保证“内容，如果违约金金额超过合同总金额，需要重点提醒'}], check_type: liability_cap, patterns: ["违约责任", "赔偿", "无限责任", "全部损失", "不设上限", "甲方已付金额", "合同总金额"], message: "赔偿责任上限或责任范围存在重大风险", suggestion: "限定赔偿上限，不接受无限责任条款"}
  - {id: E6, section: 风险控制, title: 廉政/保密/安全协议附件提醒, scope: enforce, severity: warn, source_text: "存在廉政协议、保密协议、安全协议需系统提交审核并承诺", comment_guidance: "检查附件标题是否出现上述协议", reviewer_comments: [{id: 21, anchor: '6）如需签署相关廉政协议、保密协议、安全协议的，通过合同管理系统提交审核，同时项目负责人须书面承诺全体项目组成员在项目执行过程中符合协议要求及承担责任。', text: '检查合同附件是否有廉政协议、保密协议、安全协议，有的话重点提醒'}], check_type: related_agreement_presence, patterns: ["廉政协议", "保密协议", "安全协议"], message: "检测到需额外审核的协议或附件", suggestion: "通过合同管理系统提交并补项目负责人书面承诺"}
  - {id: E7, section: 风险控制, title: 违约金计算对等性, scope: review, severity: warn, source_text: "违约金或损失赔偿应体现双方对等", comment_guidance: "需语义复核", check_type: review_only, patterns: ["违约金", "损失赔偿"], message: "违约责任对等性需人工复核", suggestion: "调整为双方对等的违约计算方式"}
  - {id: E8, section: 风险控制, title: 校名校徽标识使用限制, scope: not_checked, severity: not_checked, source_text: "应限制甲方使用学校名称校徽商标标识", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 22, anchor: '“甲方不得使用乙方中英文名称、简称、校徽、注册商标、标志、标识、主要建筑物图形及其二级单位标志的部分或全部；不得在产品、产品包装、说明书中使用“中山大学（或中山大学二级单位）监制、研制”、“中山大学（或中山大学二级单位）专利、科研产品”、“中山大学（或中山大学二级单位）技术支持”等内容；不得虚构、夸大本项目合作事项、范围、效果、规模等。。”', text: '不审核'}], check_type: not_checked, patterns: ["中山大学监制", "校徽", "商标"], message: "该项不自动审核，仅留档", suggestion: "必要时补品牌使用限制条款"}
  - {id: E9, section: 风险控制, title: 仲裁委员会名称规范, scope: enforce, severity: warn, source_text: "建议仲裁且名称应规范，如广州仲裁委员会", comment_guidance: "若出现X市仲裁委员会需提醒", reviewer_comments: [{id: 23, anchor: '8）解决争议的方法，建议采取仲裁解决的方式。用规范的名称表达，如“广州仲裁委员会”。若某些政府、事业单位、国企强烈要求法院，也可同意。', text: '搜索合同文本内的”仲裁“内容，查看仲裁委员会名称是否规范，如果委员会名称出现”市“字需要提醒，比如”广州市仲裁委员会“就是错误的'}], check_type: arbitration_name, patterns: ["仲裁", "广州仲裁委员会", "广州市仲裁委员会"], message: "仲裁机构名称疑似不规范，或争议解决条款需确认", suggestion: "优先使用规范名称“广州仲裁委员会”"}
  - {id: E10, section: 风险控制, title: 财产归属乙方, scope: not_checked, severity: not_checked, source_text: "设备器材资料等财产应归乙方所有", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 24, anchor: '9）设备、器材、资料等财产要求归乙方所有。', text: '不审核'}], check_type: not_checked, patterns: ["财产归属"], message: "该项不自动审核，仅留档", suggestion: "必要时由人工审阅财产归属条款"}
  - {id: F1, section: 其他条款, title: 附件法律条款限制, scope: not_checked, severity: not_checked, source_text: "预算技术方案可作附件但不应含法律条款", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 25, anchor: '1）预算（涉及管理费、绩效等科目的审核）、如有技术方案可作为附件，但不能包含法律条款；作为合同内容一部分的附件，需与合同合并成一个文档进行审核。', text: '不审核'}], check_type: not_checked, patterns: ["附件", "技术方案"], message: "该项不自动审核，仅留档", suggestion: "如附件含法律条款请并入主合同审查"}
  - {id: F2, section: 其他条款, title: 填空处不得留空, scope: enforce, severity: warn, source_text: "填空处不能留空，应填写无或/", comment_guidance: "检查XXX、下划线、空白括号等；签署页日期可降级", reviewer_comments: [{id: 26, anchor: '2）填空处不能留空，需填写“无”或“/”。', text: '看合同文本内是否有留空的、未填写的。。需要填写的地方一般有下划线或者用”XXX“的文本标记，检查是否有下划线但是留空，或者还留有”XXX“的文本标记'}], check_type: blanks, patterns: ["XXX", "XX", "____", "【】", "（ ）", "‘ ’"], message: "检测到疑似未填写空白项", suggestion: "补齐空白项，确需留空请填“无”或“/”"}
  - {id: F3, section: 其他条款, title: 补充终止协议权益, scope: not_checked, severity: not_checked, source_text: "补充协议和终止协议不得降低我方权益", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 27, anchor: '3）补充协议及终止协议中的我方权益应不得低于原合同要求。', text: '不审核'}], check_type: not_checked, patterns: ["补充协议", "终止协议"], message: "该项不自动审核，仅留档", suggestion: "必要时人工比对主合同与补充协议权益"}
  - {id: F4, section: 其他条款, title: 论文条款合规, scope: enforce, severity: warn, source_text: "不得约定代写论文、论文单位或作者排名", comment_guidance: "搜索论文排名关键词", reviewer_comments: [{id: 28, anchor: '4）学术道德：不可以在合同内约定帮忙写论文，或在合同里面约定论文单位、作者排名。', text: '搜索合同文本内”论文排名”，如果搜索到需要重点提醒'}], check_type: forbidden_phrase_any, patterns: ["论文排名", "作者排名", "第一作者", "通讯作者", "论文单位", "代写论文", "帮忙写论文", "撰写论文"], message: "检测到疑似不合规论文条款", suggestion: "删除论文代写或作者排名约定"}
  - {id: G1, section: 系统审核要点, title: 共享知识产权技术合同认定, scope: not_checked, severity: not_checked, source_text: "共享知识产权技术开发合同需技术合同认定", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 29, anchor: '（7）系统审核要点1）知识产权共享（我方收益大于等于1/N，N为合同各方个数）的技术开发合同在合同签订之后、经费入账之前，需要先在“广东省科技业务管理阳光政务平台”完成技术合同认定。如不认定，学校管理费按照5%扣除。2）免税认定：凡需办理免税的合同，均需要技术合同认定。3）管理费、科研业务费、绩效，与合同内容或按横向管理办法设置一致。4）合同期限：根据合同内容填写，不能倒签。5）合同方信息：科管系统上甲方是第一位，可以不填中大，但不能把中大填在第一位；合同管理系统上“合同主体信息”一定要填完整。', text: '不审核'}], check_type: not_checked, patterns: ["技术合同认定", "阳光政务平台"], message: "该项不自动审核，仅留档", suggestion: "签订后经费入账前完成技术合同认定"}
