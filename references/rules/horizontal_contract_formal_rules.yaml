  - {id: G5, section: 系统审核要点, title: 系统合同方信息, scope: not_checked, severity: not_checked, source_text: "科管系统甲方在第一位，合同主体信息需完整", comment_guidance: "批注明确不审核", reviewer_comments: [{id: 29, anchor: '（7）系统审核要点1）知识产权共享（我方收益大于等于1/N，N为合同各方个数）的技术开发合同在合同签订之后、经费入账之前，需要先在“广东省科技业务管理阳光政务平台”完成技术合同认定。如不认定，学校管理费按照5%扣除。2）免税认定：凡需办理免税的合同，均需要技术合同认定。3）管理费、科研业务费、绩效，与合同内容或按横向管理办法设置一致。4）合同期限：根据合同内容填写，不能倒签。5）合同方信息：科管系统上甲方是第一位，可以不填中大，但不能把中大填在第一位；合同管理系统上“合同主体信息”一定要填完整。', text: '不审核'}], check_type: not_checked, patterns: ["合同主体信息", "甲方第一位"], message: "该项不自动审核，仅留档", suggestion: "按系统要求完整填写合同主体信息"}


